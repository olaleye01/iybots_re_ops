<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #FFFFFF;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { text-decoration: none; color: inherit; }

    /* ── Page wrapper ── */
    .login-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 0;
    }

    /* ── Corner accent marks ── */
    .login-corners {
      position: relative;
      width: 100%;
      max-width: 520px;
      margin-bottom: 8px;
    }
    .corner {
      position: absolute;
      display: flex;
      gap: 4px;
    }
    .corner-tl { top: 0; left: 0; flex-direction: row; align-items: flex-end; }
    .corner-tr { top: 0; right: 0; flex-direction: row; align-items: flex-start; }

    /* Building block shapes */
    .blk { background: #111827; display: block; }
    /* Top-left: tall + short */
    .corner-tl .blk-a { width: 22px; height: 40px; }
    .corner-tl .blk-b { width: 13px; height: 22px; }
    /* Top-right: two squares */
    .corner-tr .blk-a { width: 22px; height: 22px; }
    .corner-tr .blk-b { width: 13px; height: 13px; align-self: flex-start; margin-top: 4px; }

    /* ── Brand header card ── */
    .login-brand-card {
      width: 100%;
      max-width: 520px;
      background: #F3F4F6;
      border-radius: 12px;
      padding: 28px 32px;
      text-align: center;
      margin-bottom: 40px;
    }
    .login-brand-name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }
    .login-brand-tagline {
      font-size: 14px;
      color: #6B7280;
    }

    /* ── Form card ── */
    .login-form-wrap {
      width: 100%;
      max-width: 520px;
    }

    /* ── Error alert ── */
    .login-alert {
      display: none;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #991B1B;
      line-height: 1.5;
    }
    .login-alert.visible { display: flex; }
    .login-alert svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ── Inputs ── */
    .login-field { margin-bottom: 14px; }
    .login-input {
      width: 100%;
      height: 52px;
      padding: 0 18px;
      border: 1.5px solid #E5E7EB;
      border-radius: 8px;
      background: #FFFFFF;
      font-family: inherit;
      font-size: 15px;
      color: #111827;
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    .login-input:focus {
      border-color: #111827;
      box-shadow: 0 0 0 3px rgba(17,24,39,0.06);
    }
    .login-input::placeholder { color: #9CA3AF; }

    /* Password row */
    .login-pw-row {
      position: relative;
    }
    .login-input-pw { padding-right: 48px; }
    .login-pw-toggle {
      position: absolute;
      right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #9CA3AF; padding: 0; display: flex; align-items: center;
    }
    .login-pw-toggle:hover { color: #6B7280; }
    .login-pw-toggle svg { width: 18px; height: 18px; }

    /* Forgot row */
    .login-forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
      margin-bottom: 24px;
    }
    .login-forgot {
      font-size: 13px;
      color: #6B7280;
      transition: color 150ms ease;
    }
    .login-forgot:hover { color: #111827; }

    /* ── Submit button ── */
    .login-btn {
      width: 100%;
      height: 52px;
      background: #111827;
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.01em;
      transition: opacity 150ms ease;
    }
    .login-btn:hover:not(:disabled) { opacity: 0.88; }
    .login-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .login-btn-arrow { font-size: 18px; line-height: 1; }
    .login-btn-spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer note ── */
    .login-footer-note {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      color: #9CA3AF;
      padding-bottom: 32px;
    }
    .login-footer-note a { color: #111827; font-weight: 500; }
    .login-footer-note a:hover { text-decoration: underline; }

    /* ── City skyline illustration ── */
    .login-skyline {
      width: 100%;
      margin-top: auto;
      display: block;
      line-height: 0;
    }
    .login-skyline svg {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 560px) {
      .login-page { padding-top: 40px; }
      .login-brand-card { padding: 22px 20px; }
      .login-brand-name { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="login-page">

  <!-- Corner accents -->
  <div class="login-corners" aria-hidden="true">
    <div class="corner corner-tl">
      <span class="blk blk-a"></span>
      <span class="blk blk-b"></span>
    </div>
    <div class="corner corner-tr">
      <span class="blk blk-a"></span>
      <span class="blk blk-b"></span>
    </div>
  </div>

  <!-- Brand header -->
  <div class="login-brand-card">
    <div class="login-brand-name">Iybots Real Estate</div>
    <div class="login-brand-tagline">Your gateway to premium property investment</div>
  </div>

  <!-- Form -->
  <div class="login-form-wrap">

    <!-- Error -->
    <div class="login-alert" id="loginAlert">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="loginAlertText">Invalid email or password. Please try again.</span>
    </div>

    <form id="loginForm" autocomplete="on">

      <!-- Email -->
      <div class="login-field">
        <input
          type="email" id="loginEmail" name="email"
          class="login-input"
          placeholder="Enter your email address"
          autocomplete="email" required
        />
      </div>

      <!-- Password -->
      <div class="login-field login-pw-row">
        <input
          type="password" id="loginPassword" name="password"
          class="login-input login-input-pw"
          placeholder="Enter your password"
          autocomplete="current-password" required
        />
        <button type="button" class="login-pw-toggle" id="pwToggle" aria-label="Show password">
          <svg id="pwEyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <!-- Forgot -->
      <div class="login-forgot-row">
        <a href="/update-password" class="login-forgot">Forgot password?</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="login-btn" id="loginBtn">
        <div class="login-btn-spinner" id="loginSpinner"></div>
        <span id="loginBtnText">Sign In</span>
        <span class="login-btn-arrow" id="loginBtnArrow" aria-hidden="true">→</span>
      </button>

    </form>

    <div class="login-footer-note">
      Having trouble? <a href="mailto:support@iybots.com">Contact support</a>
    </div>

  </div>
</div>

<script>
(function () {
  var redirectTo = "{{ redirect_to | e }}";

  /* Password toggle */
  var pwInput  = document.getElementById('loginPassword');
  var pwToggle = document.getElementById('pwToggle');
  var pwIcon   = document.getElementById('pwEyeIcon');
  var eyeOff = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  var eyeOn  = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';

  pwToggle.addEventListener('click', function () {
    var isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    pwIcon.innerHTML = isHidden ? eyeOff : eyeOn;
  });

  /* Form submit */
  var form     = document.getElementById('loginForm');
  var btn      = document.getElementById('loginBtn');
  var spinner  = document.getElementById('loginSpinner');
  var btnText  = document.getElementById('loginBtnText');
  var btnArrow = document.getElementById('loginBtnArrow');
  var alertEl  = document.getElementById('loginAlert');
  var alertTxt = document.getElementById('loginAlertText');

  function setLoading(on) {
    btn.disabled = on;
    spinner.style.display  = on ? 'block' : 'none';
    btnText.textContent    = on ? 'Signing in…' : 'Sign In';
    btnArrow.style.display = on ? 'none' : '';
  }

  function showError(msg) {
    alertTxt.textContent = msg || 'Invalid email or password.';
    alertEl.classList.add('visible');
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    alertEl.classList.remove('visible');

    var usr = document.getElementById('loginEmail').value.trim();
    var pwd = document.getElementById('loginPassword').value;
    if (!usr || !pwd) { showError('Please enter your email and password.'); return; }

    setLoading(true);

    fetch('/api/method/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-Frappe-CSRF-Token': 'fetch' },
      body: 'usr=' + encodeURIComponent(usr) + '&pwd=' + encodeURIComponent(pwd),
      credentials: 'same-origin',
    })
    .then(function (res) {
      return res.json().then(function (data) { return { status: res.status, data: data }; });
    })
    .then(function (res) {
      if (res.status === 200 && res.data.message) {
        window.location.href = redirectTo || '/portal';
      } else {
        var msg = (res.data && res.data.message) ? res.data.message : 'Invalid email or password.';
        if (msg === 'Incorrect password' || msg === 'no_permission' || msg === 'User disabled or missing') {
          msg = 'Invalid email or password. Please try again.';
        }
        showError(msg);
        setLoading(false);
      }
    })
    .catch(function () {
      showError('Unable to connect. Please check your connection and try again.');
      setLoading(false);
    });
  });

  document.getElementById('loginEmail').focus();
})();
</script>
