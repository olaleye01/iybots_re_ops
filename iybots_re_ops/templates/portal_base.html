<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Client Portal{% endblock %} — Iybots Real Estate</title>
  <link rel="stylesheet" href="/assets/iybots_re_ops/css/portal.css" />
  {% block head %}{% endblock %}
</head>
<body>
  <!-- Top bar -->
  <header class="portal-header">
    <div class="portal-header-inner">
      <a href="/portal" class="portal-logo">
        <img src="/assets/iybots_re_ops/images/logo.png" alt="Iybots" onerror="this.style.display='none'" />
        <span>Iybots RE</span>
      </a>
      <div class="portal-user">
        <span class="portal-user-name">{{ client.client_name }}</span>
        <a href="/api/method/logout" class="portal-logout-btn">Logout</a>
      </div>
    </div>
  </header>

  <!-- Bottom nav (mobile) / Side nav (desktop) -->
  <nav class="portal-nav">
    <a href="/portal" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="/portal/units" class="nav-item {% if active_page == 'units' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>My Units</span>
    </a>
    <a href="/portal/payments" class="nav-item {% if active_page == 'payments' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
      <span>Payments</span>
    </a>
    <a href="/portal/progress" class="nav-item {% if active_page == 'progress' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      <span>Progress</span>
    </a>
    <a href="/portal/documents" class="nav-item {% if active_page == 'documents' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
      <span>Documents</span>
    </a>
    <a href="/portal/support" class="nav-item {% if active_page == 'support' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
      <span>Support</span>
    </a>
  </nav>

  <!-- Main content -->
  <main class="portal-main">
    {% block content %}{% endblock %}
  </main>

  <script>
    // Mark active nav on mobile
    document.querySelectorAll('.nav-item').forEach(el => {
      if (window.location.pathname === el.getAttribute('href')) el.classList.add('active');
    });
  </script>
</body>
</html>
