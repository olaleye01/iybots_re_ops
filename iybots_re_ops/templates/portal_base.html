<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Client Portal{% endblock %} — Iybots Real Estate</title>
  <link rel="stylesheet" href="/assets/iybots_re_ops/css/portal.css" />
  {% block head %}{% endblock %}
</head>
<body>
<div class="portal-wrapper">

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ============================
       SIDEBAR
       ============================ -->
  <aside class="portal-sidebar" id="portalSidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
      <img src="/assets/iybots_re_ops/images/logo.png" alt="Iybots RE"
           onerror="this.style.display='none'" />
      <span class="sidebar-logo-text">Iybots RE</span>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <a href="/portal"
         class="sidebar-nav-item {% if active_page == 'dashboard' %}active{% endif %}"
         data-tooltip="Dashboard">
        <i data-lucide="layout-dashboard"></i>
        <span class="sidebar-nav-label">Dashboard</span>
      </a>
      <a href="/portal/units"
         class="sidebar-nav-item {% if active_page == 'units' %}active{% endif %}"
         data-tooltip="My Units">
        <i data-lucide="building-2"></i>
        <span class="sidebar-nav-label">My Units</span>
      </a>
      <a href="/portal/payments"
         class="sidebar-nav-item {% if active_page == 'payments' %}active{% endif %}"
         data-tooltip="Payments">
        <i data-lucide="credit-card"></i>
        <span class="sidebar-nav-label">Payments</span>
      </a>
      <a href="/portal/progress"
         class="sidebar-nav-item {% if active_page == 'progress' %}active{% endif %}"
         data-tooltip="Progress">
        <i data-lucide="hard-hat"></i>
        <span class="sidebar-nav-label">Progress</span>
      </a>
      <a href="/portal/documents"
         class="sidebar-nav-item {% if active_page == 'documents' %}active{% endif %}"
         data-tooltip="Documents">
        <i data-lucide="file-text"></i>
        <span class="sidebar-nav-label">Documents</span>
      </a>
      <a href="/portal/support"
         class="sidebar-nav-item {% if active_page == 'support' %}active{% endif %}"
         data-tooltip="Support">
        <i data-lucide="headphones"></i>
        <span class="sidebar-nav-label">Support</span>
      </a>
    </nav>

    <!-- User section -->
    <div class="sidebar-user">
      <div class="user-dropdown" id="userDropdown">
        <a href="#" id="logoutBtn" class="user-dropdown-item danger">
          <i data-lucide="log-out"></i>
          Sign out
        </a>
      </div>
      <div class="sidebar-user-trigger" id="userTrigger">
        <div class="sidebar-avatar">{{ (client.client_name or 'C')[0] | upper }}</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">{{ client.client_name }}</div>
          <div class="sidebar-user-role">Client</div>
        </div>
        <i data-lucide="chevrons-up-down" class="sidebar-user-chevron"></i>
      </div>
    </div>

    <!-- Collapse toggle (desktop only) -->
    <div class="sidebar-toggle">
      <button class="sidebar-toggle-btn" id="sidebarToggle" title="Toggle sidebar">
        <i data-lucide="chevrons-left"></i>
      </button>
    </div>

  </aside>

  <!-- ============================
       MAIN AREA
       ============================ -->
  <div class="portal-main-area" id="portalMainArea">

    <!-- Mobile topbar -->
    <header class="portal-topbar">
      <button class="topbar-hamburger" id="hamburgerBtn" aria-label="Open menu">
        <i data-lucide="menu"></i>
      </button>
      <div class="topbar-logo">
        <img src="/assets/iybots_re_ops/images/logo.png" alt="Iybots RE"
             onerror="this.style.display='none'" />
        <span>Iybots RE</span>
      </div>
      <div class="topbar-spacer"></div>
    </header>

    <!-- Page content -->
    <main class="portal-main">
      {% block content %}{% endblock %}
    </main>

  </div>
</div>

<!-- Lucide Icons CDN -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  lucide.createIcons();

  /* ----- Sidebar collapse (desktop) ----- */
  var sidebar    = document.getElementById('portalSidebar');
  var mainArea   = document.getElementById('portalMainArea');
  var toggleBtn  = document.getElementById('sidebarToggle');
  var KEY        = 'portalSidebarCollapsed';

  function setSidebarCollapsed(collapsed) {
    sidebar.classList.toggle('collapsed', collapsed);
    mainArea.classList.toggle('sidebar-collapsed', collapsed);
  }

  setSidebarCollapsed(localStorage.getItem(KEY) === 'true');

  if (toggleBtn) {
    toggleBtn.addEventListener('click', function () {
      var nowCollapsed = sidebar.classList.contains('collapsed');
      setSidebarCollapsed(!nowCollapsed);
      localStorage.setItem(KEY, !nowCollapsed);
    });
  }

  /* ----- Mobile drawer ----- */
  var overlay    = document.getElementById('sidebarOverlay');
  var hamburger  = document.getElementById('hamburgerBtn');

  function openDrawer() {
    sidebar.classList.add('mobile-open');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer() {
    sidebar.classList.remove('mobile-open');
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  if (hamburger) hamburger.addEventListener('click', openDrawer);
  if (overlay)   overlay.addEventListener('click', closeDrawer);

  /* ----- User dropdown ----- */
  var userTrigger  = document.getElementById('userTrigger');
  var userDropdown = document.getElementById('userDropdown');

  if (userTrigger) {
    userTrigger.addEventListener('click', function (e) {
      e.stopPropagation();
      userDropdown.classList.toggle('open');
    });
    document.addEventListener('click', function () {
      userDropdown.classList.remove('open');
    });
  }

  /* ----- Logout ----- */
  var logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', function (e) {
      e.preventDefault();
      fetch('/api/method/logout', { method: 'GET', credentials: 'same-origin' })
        .finally(function () {
          window.location.href = '/#login';
        });
    });
  }

  /* ----- Tab switching (payments page) ----- */
  document.querySelectorAll('.page-tab').forEach(function (tab) {
    tab.addEventListener('click', function (e) {
      e.preventDefault();
      var target = tab.getAttribute('data-tab');
      document.querySelectorAll('.page-tab').forEach(function (t) { t.classList.remove('active'); });
      document.querySelectorAll('.tab-pane').forEach(function (p) { p.classList.remove('active'); });
      tab.classList.add('active');
      var pane = document.getElementById(target);
      if (pane) pane.classList.add('active');
    });
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
